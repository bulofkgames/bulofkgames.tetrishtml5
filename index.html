<!DOCTYPE html>
<html>
    <head>
        <title>HTML5 Tetris</title>
        <link rel='stylesheet' href='style.css' />
    </head>
    <body>
        <audio id="clearsound" src="sound/pop.ogg" preload="auto"></audio>
        <canvas width='300' height='600'></canvas>
        <button id="playbutton" onclick="playButtonClicked();">Play</button>
        <script src='js/tetris.js'></script>
        <script src='js/controller.js'></script>
        <script src='js/render.js'></script>
   <script>
  (function () {
    const allowedDomains = [
      "bulofkgames.blogspot.com",
      "thebulofkproject.blogspot.com",
      "github.io"
    ];

    const OFFICIAL_SITE = "https://bulofkgames.blogspot.com/";
    const ref = document.referrer.toLowerCase();

    if (!ref) return;

    const allowed = allowedDomains.some(domain => ref.includes(domain));

    if (!allowed) {
      window.location.replace(OFFICIAL_SITE);
    }
  })();
  </script>

</body>
</html>
